<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Waiter App with CRUD</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    input, select, button {
      margin: 5px;
      padding: 6px;
    }
    h1 {
      margin-top: 40px;
    }
    .table {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 10px;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      margin-bottom: 5px;
    }
  </style>
</head>
<body>

  <h2>Waiter Order Entry</h2>
  <input type="text" id="dishName" placeholder="Dish Name" />
  <input type="number" id="dishPrice" placeholder="Price" />
  <select id="tableSelect">
    <option value="Table 1">Table 1</option>
    <option value="Table 2">Table 2</option>
    <option value="Table 3">Table 3</option>
  </select>
  <button onclick="addOrder()">Add Order</button>

  <h1>Orders</h1>

  <div class="table">
    <h3>Table 1</h3>
    <ul id="Table 1"></ul>
  </div>

  <div class="table">
    <h3>Table 2</h3>
    <ul id="Table 2"></ul>
  </div>

  <div class="table">
    <h3>Table 3</h3>
    <ul id="Table 3"></ul>
  </div>

  <!-- Link external JS file -->
  <script src="waiter.js"></script>
</body>
</html>
